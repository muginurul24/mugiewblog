name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Laravel
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    services:
      mysql:
        image: docker.io/library/mysql:8.4
        env:
          MYSQL_DATABASE: mugiewblog_test
          MYSQL_ROOT_PASSWORD: password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="MYSQL_PWD=password mysqladmin ping -h 127.0.0.1 -uroot --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: docker.io/library/redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      APP_ENV: testing
      APP_DEBUG: true
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: mugiewblog_test
      DB_USERNAME: root
      DB_PASSWORD: password
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      SESSION_DRIVER: database
      REDIS_HOST: 127.0.0.1

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          extensions: bcmath, gd, intl, mbstring, pcntl, pdo_mysql, redis, zip
          tools: composer:v2
          coverage: none

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Validate composer manifest
        run: composer validate --strict --no-check-publish

      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Prepare app
        run: |
          cp .env.example .env
          php artisan key:generate --ansi
          php artisan migrate --force --ansi

      - name: Check code style
        run: vendor/bin/pint --test --format=agent

      - name: Run tests
        run: php artisan test --compact

      - name: Build assets
        run: bun run build
