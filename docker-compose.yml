services:
  app:
    build:
      context: .
      target: production
    image: localhost/mugiewblog-app:latest
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${COMPOSE_APP_URL:-http://localhost:8080}
      DB_HOST: mysql
      DB_DATABASE: ${DB_DATABASE:-mugiewblog}
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: database
    ports:
      - "${COMPOSE_APP_PORT:-8080}:8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app_storage:/app/storage
      - app_cache:/app/bootstrap/cache
    healthcheck:
      test: ["CMD-SHELL", "php -r \"exit(@file_get_contents('http://127.0.0.1:8000/up') === false ? 1 : 0);\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  horizon:
    image: localhost/mugiewblog-app:latest
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${COMPOSE_APP_URL:-http://localhost:8080}
      DB_HOST: mysql
      DB_DATABASE: ${DB_DATABASE:-mugiewblog}
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
    command: ["php", "artisan", "horizon"]
    depends_on:
      app:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app_storage:/app/storage
      - app_cache:/app/bootstrap/cache
    healthcheck:
      test: ["CMD-SHELL", "php artisan horizon:status --no-ansi | grep -qi 'running'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  scheduler:
    image: localhost/mugiewblog-app:latest
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${COMPOSE_APP_URL:-http://localhost:8080}
      DB_HOST: mysql
      DB_DATABASE: ${DB_DATABASE:-mugiewblog}
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
    command: ["php", "artisan", "schedule:work"]
    depends_on:
      app:
        condition: service_healthy
    volumes:
      - app_storage:/app/storage
      - app_cache:/app/bootstrap/cache
    healthcheck:
      test: ["CMD-SHELL", "php artisan schedule:list --no-ansi >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  mysql:
    image: docker.io/library/mysql:8.4
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-mugiewblog}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "${COMPOSE_MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "MYSQL_PWD=\"$${MYSQL_ROOT_PASSWORD}\" mysqladmin ping -h 127.0.0.1 -uroot --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: docker.io/library/redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${COMPOSE_REDIS_PORT:-6380}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  app_cache:
  app_storage:
  mysql_data:
  redis_data:
